<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo de expresiones</title>
    </head>
    <body>
        <button onclick="sueldo();">Ejecutar</button>
        <script>
            function sueldo () {

                let sueldo = 450000;
                const sueldomin = 539000;
                                
                if (sueldo >= sueldomin) {
                    console.log("El sueldo es mayor que el sueldo mínimo");
                 } else  {
                    console.log("El sueldo es menor que el sueldo mínimo");}
            }

        </script>
    </body>
</html>
