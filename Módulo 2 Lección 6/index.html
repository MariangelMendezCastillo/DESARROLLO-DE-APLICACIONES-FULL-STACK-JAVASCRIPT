<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Calculadora básica con jquery</title>

        <script src="./js/jquery-4.0.0.min.js"></script>
        <style>

        body {
            font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
            margin: 30px;
            background-color: rgb(239, 245, 245);
             }

        input {
            width: 100px;
            padding: 5px;
            margin: 5px;
        }

        button {
            margin: 5px;
            padding: 8px 15px;
            cursor: pointer;
        }

        .resultado {
            font-weight: bold;
            
        }
    </style>
        
    </head>
    <body>
        <h1>Calculadora básica</h1>
        <div>
        <input type="number" placeholder="Ingrese el primer número" id="número1">
        <input type="number" placeholder="Ingrese el segundo número" id="número2">
        <p id="resultado"></p>
        </div>
        <br>
        <button id="btnsuma">Sumar</button>

        <script>
            $("#btnsuma").click(
                function(){
                    let número1=$("#número1").val();
                    let número2=$("#número2").val();

                    let resultado= Number(número1)+Number(número2);
                    //Muestra el resultado en el párrafo
                    $("#resultado").text("El resultado es: "+ resultado);
                }
            );

        </script>
    </body>
    </html>
