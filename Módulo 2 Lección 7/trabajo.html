<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
   <title>Perfil de Estudiante</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark  ">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Perfil Estudiante</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="#formulario">Formulario</a></li>
          <li class="nav-item"><a class="nav-link" href="#perfil">Perfil</a></li>
          <li class="nav-item"><a class="nav-link" href="#consultas">Consultas</a></li>
          <li class="nav-item"><a class="nav-link" href="#tramites">Trámites</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenido principal -->
  <main class="container mt-4">
    <section id="formulario">
      <h2>Registrar Estudiante</h2>
      <form>
        <div class="mb-3">
          <label for="nombre" class="form-label">Nombre</label>
          <input type="text" id="nombre" class="form-control" placeholder="Ingresa el nombre">
        </div>
        <div class="mb-3">
          <label for="edad" class="form-label">Edad</label>
          <input type="number" id="edad" class="form-control" placeholder="Ingresa la edad">
        </div>
        <div class="mb-3">
          <label for="carrera" class="form-label">Carrera</label>
          <input type="text" id="carrera" class="form-control" placeholder="Ingresa la carrera">
        </div>
        <button type="button" class="btn btn-primary" onclick="mostrarPerfil()">Mostrar Perfil</button>
      </form>
    </section>

    <!-- Ficha del estudiante -->
    <section id="perfil" class="mt-5">
      <h2>Ficha del Estudiante</h2>
      <div id="resultado" class="card p-3 shadow-sm">
        <!-- Aquí se mostrará la información -->
      </div>
    </section>
  </main>

  <!-- JavaScript -->
  <script>
    function mostrarPerfil() {
      // Obtener valores con getElementById
      const nombre = document.getElementById("nombre").value;
      const edad = document.getElementById("edad").value;
      const carrera = document.getElementById("carrera").value;

      // Construir ficha
      const ficha = `
        <p><strong>Nombre:</strong> ${nombre}</p>
        <p><strong>Edad:</strong> ${edad}</p>
        <p><strong>Carrera:</strong> ${carrera}</p>
      `;

      // Mostrar en el div resultado
      document.getElementById("resultado").innerHTML = ficha;
    }
  </script>

</body>
</html>
