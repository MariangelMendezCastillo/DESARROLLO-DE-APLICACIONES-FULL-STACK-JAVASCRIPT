<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Ejemplo de condicionales</title>
    </head>
    <body>
        <button onclick="mayor();">Ejecutar</button>
        <script>
            function mayor() {
                const numero1 = 4, numero2 = 4;
                
                if (numero1 > numero2) {
                    console.log("El primer número es el mayor")
                } else {
                     if (numero1 < numero2) {
                    console.log("El segundo número es el mayor")
                } else {
                    console.log("Los números son iguales")
                }
            }
                
            }
        </script>
    </body>
</html>
